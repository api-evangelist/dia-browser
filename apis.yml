aid: dia-browser
url: https://raw.githubusercontent.com/api-evangelist/dia-browser/refs/heads/main/apis.yml
name: Dia (The Browser Company)
kind: company
description: >-
  Dia is The Browser Company's successor browser to Arc, positioned as an
  AI-native browser that integrates a chat assistant, contextual search across
  open tabs and connected apps (GSuite, Slack, Notion, GitHub), Morning Brief
  summaries, automatic Reports, Better Meetings, and Live Work integrations
  directly into the browsing surface. Currently available on macOS 14+ on
  Apple Silicon. No public developer REST API or SDK has been published; the
  product is consumer-facing and integrates with third parties as a user-side
  agent rather than via developer APIs.
